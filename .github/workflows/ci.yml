name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root --with dev

      - name: Run Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: poetry run python -m pytest --cov=robin --cov=robin-ui --cov-report=xml:coverage-python.xml

      - name: Upload Python coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-python.xml
          flags: python
          name: python-coverage

  test-typescript-coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - frontend: robin-dashboard
            frontend_label: robin-dashboard
          - frontend: robin-ui/frontend
            frontend_label: robin-ui-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.frontend }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.frontend }}
        run: npm ci

      - name: Install coverage runner
        working-directory: ${{ matrix.frontend }}
        run: npm install --no-save vitest@3.2.4 @vitest/coverage-v8@3.2.4

      - name: Run TypeScript coverage (allow zero)
        working-directory: ${{ matrix.frontend }}
        run: |
          npx vitest run --passWithNoTests \
            --coverage.enabled \
            --coverage.provider=v8 \
            --coverage.reporter=lcov \
            --coverage.reportsDirectory=coverage \
            --coverage.all \
            --coverage.include='src/**/*.ts' \
            --coverage.include='src/**/*.tsx'

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.frontend }}/coverage/lcov.info
          flags: typescript
          name: typescript-coverage-${{ matrix.frontend_label }}
