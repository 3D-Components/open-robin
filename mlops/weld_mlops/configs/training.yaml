dataset:
  csv_path: data/gold/train_dataset.csv
  quality_flag_ok_value: ok
  feature_columns:
    - target_current_A
    - target_travel_speed_mps
    - wire_speed_mpm_model_input
  target_columns:
    - height_mm_target
    - width_mm_target

split:
  val_fraction: 0.2
  random_seed: 42

training:
  batch_size: 8
  epochs: 500
  learning_rate: 0.001
  weight_decay: 0.0001
  hidden_dims: [64, 32]
  dropout: 0.1
  patience: 50
  device: cpu

outputs:
  artifacts_dir: data/models/legacy_robin_data_01/train_split_torch
  model_path: data/models/legacy_robin_data_01/train_split_torch/torch_regressor.pt
  scaler_path: data/models/legacy_robin_data_01/train_split_torch/feature_scaler.joblib
  metrics_path: data/models/legacy_robin_data_01/train_split_torch/training_metrics.json
